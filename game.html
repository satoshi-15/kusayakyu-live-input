<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>草野球ライブ入力</title>
<link rel="stylesheet" href="./css/style.css" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-192.png" />
<meta name="theme-color" content="#1a6b3c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="草野球入力" />
</head>
<body>
<main class="container">
  <a href="./index.html" class="back-link">← 最初の画面(新規試合作成)に戻る</a>
  <header class="game-header">
    <span id="game-info">読み込み中...</span>
    <span id="connection-status">●</span>
  </header>

  <button type="button" id="track-pitching-toggle" class="btn-secondary" style="margin:8px 0;">投手成績記録: -</button>
  <button type="button" id="lineup-edit-toggle-btn" class="btn-secondary" style="margin:8px 0;">オーダーを編集</button>

  <div id="lineup-edit-box" class="hidden">
    <p class="field-hint">打順・守備位置を修正できます(試合中いつでも変更可能)</p>
    <div id="lineup-edit-rows"></div>
    <button type="button" id="lineup-edit-add-row" class="btn-secondary">+ 選手を追加</button>
    <div class="lineup-edit-actions">
      <button type="button" id="lineup-edit-cancel" class="btn-secondary">キャンセル</button>
      <button type="button" id="lineup-edit-save" class="btn-primary">保存</button>
    </div>
  </div>

  <label>入力者名
    <input type="text" id="entered-by-input" placeholder="あなたの名前" />
  </label>

  <div id="pointer-box"></div>
  <div id="runners-box"></div>

  <div class="quick-events">
    <button type="button" class="btn-secondary" data-event="stolen_base">盗塁</button>
    <button type="button" class="btn-secondary" data-event="caught_stealing">盗塁死</button>
    <button type="button" class="btn-secondary" data-event="runner_out_advancing">走塁死</button>
    <button type="button" class="btn-secondary pitching-only" data-event="wild_pitch">暴投</button>
    <button type="button" class="btn-secondary pitching-only" data-event="balk">ボーク</button>
    <button type="button" class="btn-secondary pitching-only" data-event="passed_ball">パスボール</button>
  </div>

  <div id="defense-simple" class="hidden">
    <p>投手成績を記録しない設定です。相手の攻撃の結果に応じて押してください。</p>
    <label><input type="checkbox" id="simple-scored-checkbox" style="display:inline-block;width:auto;" /> このプレーで相手が得点した</label>
    <button type="button" id="simple-out-btn" class="btn-primary">アウト</button>
    <button type="button" id="simple-reach-btn" class="btn-secondary">出塁(四球・安打等)</button>
  </div>

  <form id="atbat-form">
    <div id="offense-fields">
      <label>打者
        <select id="batter-select"></select>
      </label>
      <label id="batter-other-label" class="hidden">打者(自由入力、players.jsonのid。例: minamihara)
        <input type="text" id="batter-other-input" />
      </label>
    </div>
    <div id="defense-fields" class="hidden">
      <label>投手(交代した場合はここで変更)
        <select id="pitcher-select"></select>
      </label>
      <label>相手打者名(任意)
        <input type="text" id="opponent-batter-name" placeholder="例: 4番 田中" />
      </label>
    </div>

    <div id="runners-scored-box" class="hidden">
      <p class="field-hint">この打席で他の走者に変化はありましたか?(生還・進塁・アウトを選択、複数可)</p>
      <div id="runners-scored-list"></div>
    </div>
    <div id="batter-fc-box" class="hidden">
      <p class="field-hint">打者はどうなりましたか?</p>
      <label><input type="radio" name="batter-fc" value="out" checked style="display:inline-block;width:auto;" /> アウト(併殺)</label>
      <label><input type="radio" name="batter-fc" value="safe" style="display:inline-block;width:auto;" /> セーフ(野選、打点は付与されません)</label>
    </div>

    <label>結果(打球方向まで選択)
      <select id="result-select" required></select>
    </label>
    <label>打点
      <input type="number" id="rbi-input" min="0" max="4" value="0" />
    </label>
    <label><input type="checkbox" id="scored-checkbox" style="display:inline-block;width:auto;" /> 生還した</label>

    <button type="submit" id="submit-btn" class="btn-primary">この打席を記録</button>
  </form>

  <div id="pending-badge" class="pending-badge"></div>
  <button type="button" id="undo-btn" class="btn-secondary hidden">直前の入力を取り消す(5秒以内)</button>

  <h2>最近の入力</h2>
  <div id="recent-list"></div>

  <button type="button" id="close-game-btn" class="btn-danger" style="margin-top:24px;">試合終了</button>
</main>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <div id="modal-message"></div>
    <div class="modal-actions">
      <button type="button" id="modal-cancel" class="btn-secondary">キャンセル</button>
      <button type="button" id="modal-confirm" class="btn-danger">実行</button>
    </div>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
