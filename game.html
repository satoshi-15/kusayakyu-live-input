<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>草野球ライブ入力</title>
<link rel="stylesheet" href="./css/style.css" />
</head>
<body>
<main class="container">
  <header class="game-header">
    <span id="game-info">読み込み中...</span>
    <span id="connection-status">●</span>
  </header>

  <div id="pointer-box"></div>

  <div class="quick-events">
    <button type="button" class="btn-secondary" data-event="stolen_base">盗塁</button>
    <button type="button" class="btn-secondary" data-event="caught_stealing">盗塁死</button>
    <button type="button" class="btn-secondary" data-event="runner_out_advancing">走塁死</button>
    <button type="button" class="btn-secondary" data-event="wild_pitch">暴投</button>
    <button type="button" class="btn-secondary" data-event="balk">ボーク</button>
  </div>

  <form id="atbat-form">
    <div id="offense-fields">
      <label>打者
        <select id="batter-select"></select>
      </label>
      <label id="batter-other-label" class="hidden">打者(自由入力、players.jsonのid。例: minamihara)
        <input type="text" id="batter-other-input" />
      </label>
    </div>
    <div id="defense-fields" class="hidden">
      <label>投手(交代した場合はここで変更)
        <select id="pitcher-select"></select>
      </label>
      <label>相手打者名(任意)
        <input type="text" id="opponent-batter-name" placeholder="例: 4番 田中" />
      </label>
    </div>

    <label>結果(打球方向まで選択)
      <select id="result-select" required></select>
    </label>
    <label>打点
      <input type="number" id="rbi-input" min="0" max="4" value="0" />
    </label>
    <label><input type="checkbox" id="scored-checkbox" style="display:inline-block;width:auto;" /> 生還した</label>
    <label>入力者名
      <input type="text" id="entered-by-input" placeholder="あなたの名前" required />
    </label>

    <button type="submit" id="submit-btn" class="btn-primary">この打席を記録</button>
  </form>

  <div id="pending-badge" class="pending-badge"></div>
  <button type="button" id="undo-btn" class="btn-secondary hidden">直前の入力を取り消す(5秒以内)</button>

  <h2>最近の入力</h2>
  <div id="recent-list"></div>

  <button type="button" id="close-game-btn" class="btn-danger" style="margin-top:24px;">試合終了</button>
</main>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="modal-message"></p>
    <div class="modal-actions">
      <button type="button" id="modal-cancel" class="btn-secondary">キャンセル</button>
      <button type="button" id="modal-confirm" class="btn-danger">実行</button>
    </div>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
