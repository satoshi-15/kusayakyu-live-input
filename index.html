<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>草野球ライブ入力 - 新規試合</title>
<link rel="stylesheet" href="./css/style.css" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" href="./icons/icon-192.png" />
<meta name="theme-color" content="#1a6b3c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="草野球入力" />
</head>
<body>
<main class="container">
  <div id="open-games-box" class="hidden">
    <h2>開催中の試合</h2>
    <div id="open-games-list"></div>
  </div>

  <h1>新規試合を作成</h1>
  <form id="new-game-form">
    <label>対戦相手名<input type="text" id="opponent-name" required /></label>
    <label>試合日<input type="date" id="game-date" required /></label>
    <label>自チームの攻撃順
      <select id="our-half" required>
        <option value="top">先攻(表)</option>
        <option value="bottom">後攻(裏)</option>
      </select>
    </label>
    <label><input type="checkbox" id="track-pitching-checkbox" checked style="display:inline-block;width:auto;" /> 投手成績も記録する(相手打席の詳細入力。試合中も切り替え可能)</label>

    <h2>スターティングメンバー(打順)</h2>
    <div id="lineup-rows"></div>
    <button type="button" id="add-lineup-row" class="btn-secondary">+ 選手を追加</button>

    <button type="submit" class="btn-primary">試合を作成して入力画面へ</button>
  </form>
  <p id="error-message" class="error"></p>
  <p class="app-version">v1.0</p>
</main>
<script type="module" src="./js/index-app.js"></script>
</body>
</html>
